name: Build PHAR

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build archive
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          extensions: phar
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: composer-${{ runner.os }}-8.5-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-8.5-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist --no-dev

      - name: Build PHAR
        run: composer build-phar

      - name: Upload PHAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: manage-cluster-phar
          path: dist/manage-cluster.phar
          if-no-files-found: error

      - name: Attach PHAR to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/manage-cluster.phar
